<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,苹方;padding:15px;}
        #box{background:#fff;border-radius:14px;padding:15px;min-height:320px;margin-bottom:15px;}
        #txt{width:100%;height:90px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:16px;}
        #btn{width:100%;background:#2563eb;color:#fff;border:0;border-radius:10px;height:44px;font-size:16px;margin-top:8px;}
    </style>
</head>
<body>
    <div id="box">AI 回答在这里</div>
    <textarea id="txt" placeholder="输入问题..."></textarea>
    <button id="btn">发送</button>

<script>
const key = "sk-7d8e6d1bac444dd4810ea5e84b15307c";
const url = "https://api.deepseek.com/v1/chat/completions";

let b = document.getElementById("btn");
let t = document.getElementById("txt");
let box = document.getElementById("box");

b.onclick = async function(){
    let q = t.value.trim();
    if(!q){box.innerText="请输入内容";return;}
    box.innerText="正在回答...";
    t.value="";

    let res = await fetch(url,{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+key
        },
        body:JSON.stringify({
            model:"deepseek-chat",
            messages:[{"role":"user","content":q}]
        })
    });

    let data = await res.json();
    box.innerText = data.choices[0].message.content;
}
</script>
</body>
</html>
